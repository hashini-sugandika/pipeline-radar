apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pipeline-radar-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - pipeline-radar
  selector:
    matchLabels:
      app: ingestion-service
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
