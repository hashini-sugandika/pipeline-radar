apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: pipeline-radar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: pipelineradar
        - name: POSTGRES_USER
          value: radar
        - name: POSTGRES_PASSWORD
          value: radarpass
        ports:
        - containerPort: 5432
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: pipeline-radar
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
