apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: pipeline-radar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
      - name: ingestion-service
        image: ghcr.io/hashini-sugandika/pipeline-radar-ingestion:latest
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          value: postgresql://radar:radarpass@postgres:5432/pipelineradar
        - name: REDIS_URL
          value: redis://redis:6379
        - name: GITHUB_WEBHOOK_SECRET
          value: ""
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: pipeline-radar
spec:
  selector:
    app: ingestion-service
  ports:
  - port: 3001
    targetPort: 3001
  type: NodePort
