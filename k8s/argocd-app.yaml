apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipeline-radar
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hashini-sugandika/pipeline-radar.git
    targetRevision: HEAD
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: pipeline-radar
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
