name: PipelineRadar CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  test-ingestion:
    name: Test Ingestion Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/ingestion-service/package-lock.json

      - name: Install dependencies
        working-directory: services/ingestion-service
        run: npm ci

      - name: Run tests
        working-directory: services/ingestion-service
        run: npm test --if-present

  test-analysis:
    name: Test Analysis Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/analysis-service/package-lock.json

      - name: Install dependencies
        working-directory: services/analysis-service
        run: npm ci

      - name: Run tests
        working-directory: services/analysis-service
        run: npm test --if-present

  test-alerts:
    name: Test Alerts Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/alerts-service/package-lock.json

      - name: Install dependencies
        working-directory: services/alerts-service
        run: npm ci

      - name: Run tests
        working-directory: services/alerts-service
        run: npm test --if-present

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-ingestion, test-analysis, test-alerts]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ingestion service
        uses: docker/build-push-action@v5
        with:
          context: ./services/ingestion-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pipeline-radar-ingestion:latest
            ghcr.io/${{ github.repository_owner }}/pipeline-radar-ingestion:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push analysis service
        uses: docker/build-push-action@v5
        with:
          context: ./services/analysis-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pipeline-radar-analysis:latest
            ghcr.io/${{ github.repository_owner }}/pipeline-radar-analysis:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push alerts service
        uses: docker/build-push-action@v5
        with:
          context: ./services/alerts-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pipeline-radar-alerts:latest
            ghcr.io/${{ github.repository_owner }}/pipeline-radar-alerts:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on ingestion service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/pipeline-radar-ingestion:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Run Trivy on analysis service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/pipeline-radar-analysis:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Run Trivy on alerts service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/pipeline-radar-alerts:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
